<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>
  <rect x="40" y="40" width="1520" height="820" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="110" font-family="monospace" font-size="36" fill="#f8fafc">Persistencia retrocompatible (legacy)</text>
  <text x="80" y="160" font-family="monospace" font-size="24" fill="#94a3b8">Estructura exportada: user/password/nodes/edges + extensiones opcionales</text>

  <rect x="80" y="200" width="1440" height="600" rx="12" fill="#020617" stroke="#475569"/>
  <text x="110" y="250" font-family="monospace" font-size="22" fill="#e2e8f0">{</text>
  <text x="140" y="285" font-family="monospace" font-size="22" fill="#38bdf8">&quot;user&quot;</text><text x="255" y="285" font-family="monospace" font-size="22" fill="#e2e8f0">: &quot;demo&quot;,</text>
  <text x="140" y="320" font-family="monospace" font-size="22" fill="#38bdf8">&quot;password&quot;</text><text x="300" y="320" font-family="monospace" font-size="22" fill="#e2e8f0">: &quot;1234&quot;,</text>
  <text x="140" y="355" font-family="monospace" font-size="22" fill="#38bdf8">&quot;nodes&quot;</text><text x="255" y="355" font-family="monospace" font-size="22" fill="#e2e8f0">: [ { id, x, y, data: { firstName, ... } } ],</text>
  <text x="140" y="390" font-family="monospace" font-size="22" fill="#38bdf8">&quot;edges&quot;</text><text x="255" y="390" font-family="monospace" font-size="22" fill="#e2e8f0">: [ { id, from, to, type, label } ],</text>
  <text x="140" y="425" font-family="monospace" font-size="22" fill="#f59e0b">&quot;customLinkTypes&quot;</text><text x="380" y="425" font-family="monospace" font-size="22" fill="#e2e8f0">: [ ... ]  // opcional</text>
  <text x="140" y="460" font-family="monospace" font-size="22" fill="#f59e0b">&quot;familyGroups&quot;</text><text x="350" y="460" font-family="monospace" font-size="22" fill="#e2e8f0">: [ ... ]   // opcional</text>
  <text x="110" y="495" font-family="monospace" font-size="22" fill="#e2e8f0">}</text>

  <text x="110" y="560" font-family="monospace" font-size="22" fill="#22c55e">Importación acepta usuario vacío (&quot;user&quot;: &quot;&quot;) y arrays legacy.</text>
  <text x="110" y="595" font-family="monospace" font-size="22" fill="#22c55e">Los datos nuevos se mantienen sin romper consumidores antiguos.</text>

  <text x="80" y="845" font-family="monospace" font-size="18" fill="#94a3b8">Archivo generado para evidenciar el cambio solicitado en persistencia JSON.</text>
</svg>
